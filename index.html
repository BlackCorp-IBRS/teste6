<html lang="pt-BR">

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5b800;
      --gold-bright: #ffd700;
      --gold-dim: #a07800;
      --gold-glow: rgba(245,184,0,0.35);
      --black: #000000;
      --black-deep: #050505;
      --black-card: #0a0a0a;
      --white: #ffffff;
      --text-muted: rgba(245,184,0,0.55);
      --border: rgba(245,184,0,0.25);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black-deep);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── HUD CORNERS ── */
    .hud {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }
    .hud-tl { top: 18px; left: 18px; }
    .hud-tr { top: 18px; right: 18px; text-align: right; }
    .hud-bl { bottom: 18px; left: 18px; }
    .hud-br { bottom: 18px; right: 18px; text-align: right; }

    .hud-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      line-height: 1.6;
    }
    .hud-bar {
      display: flex;
      gap: 2px;
      margin-top: 5px;
    }
    .hud-bar span {
      display: block;
      width: 18px; height: 2px;
      background: var(--gold-dim);
    }
    .hud-bar span:nth-child(1) { background: var(--gold); }
    .hud-bar span:nth-child(2) { background: var(--gold); }
    .hud-bar.right { justify-content: flex-end; }

    .hud-cross {
      position: relative;
      width: 14px; height: 14px;
    }
    .hud-cross::before,
    .hud-cross::after {
      content: '';
      position: absolute;
      background: var(--gold-dim);
    }
    .hud-cross::before { width: 1px; height: 100%; left: 50%; top: 0; }
    .hud-cross::after  { height: 1px; width: 100%; top: 50%; left: 0; }

    .hud-corner {
      width: 28px; height: 28px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .hud-tl .hud-corner { border-width: 1.5px 0 0 1.5px; }
    .hud-tr .hud-corner { border-width: 1.5px 1.5px 0 0; margin-left: auto; }
    .hud-bl .hud-corner { border-width: 0 0 1.5px 1.5px; }
    .hud-br .hud-corner { border-width: 0 1.5px 1.5px 0; margin-left: auto; }

    /* ── SCAN LINE ── */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative;
      z-index: 3;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 80px;
      gap: 0;
    }

    /* ── LOGO CONTAINER ── */
    .logo-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Outer ring */
    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow:
        0 0 18px var(--gold-glow),
        0 0 40px var(--gold-glow),
        inset 0 0 20px rgba(245,184,0,0.08);
    }

    /* Rotating dashed ring */
    .logo-ring-spin {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px dashed rgba(245,184,0,0.2);
      animation: spinRing 20s linear infinite;
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* SVG logo graphic */
.logo-svg {
  width: 130px;
  height: 130px;
  position: relative;
  z-index: 2;

}

/* NOVO CÓDIGO */

<script>
// ── PARTICLE + GRID CANVAS ──────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], lines = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  // Build particles
  function buildParticles() {
    particles = [];
    const count = Math.floor((W * H) / 9000);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.3,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        alpha: Math.random() * 0.6 + 0.1,
      });
    }
  }

  // Draw grid lines (subtle)
  function drawGrid() {
    const step = 80;
    ctx.strokeStyle = 'rgba(245,184,0,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,184,0,${p.alpha})`;
      ctx.fill();
    });
  }

  // Occasional horizontal scan line
  let scanY = -4;
  function drawScanBeam() {
    scanY += 1.2;
    if (scanY > H + 4) scanY = -4;
    const grad = ctx.createLinearGradient(0, scanY - 6, 0, scanY + 6);
    grad.addColorStop(0, 'rgba(245,184,0,0)');
    grad.addColorStop(0.5, 'rgba(245,184,0,0.04)');
    grad.addColorStop(1, 'rgba(245,184,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, scanY - 6, W, 12);
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawGrid();
    drawParticles();
    drawScanBeam();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); buildParticles(); });
  resize();
  buildParticles();
  loop();
})();

// ── STATUS DOTS PULSE ───────────────────────────────────────────────────────
(function() {
  const dots = document.querySelectorAll('.dot');
  let idx = 0;
  setInterval(() => {
    dots.forEach(d => d.classList.remove('active'));
    dots[idx % dots.length].classList.add('active');
    dots[(idx + 1) % dots.length].classList.add('active');
    idx++;
  }, 1200);
})();

// ── BUTTON RIPPLE ───────────────────────────────────────────────────────────
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const ripple = document.createElement('span');
    Object.assign(ripple.style, {
      position: 'absolute',
      left: x + 'px', top: y + 'px',
      width: '4px', height: '4px',
      background: 'rgba(245,184,0,0.4)',
      borderRadius: '50%',
      transform: 'translate(-50%,-50%) scale(0)',
      animation: 'rippleAnim 0.55s ease-out forwards',
      pointerEvents: 'none',
    });
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});

// Inject ripple keyframes
const s = document.createElement('style');
s.textContent = `
@keyframes rippleAnim {
  to { transform: translate(-50%,-50%) scale(80); opacity: 0; }
}`;
document.head.appendChild(s);
</script>
</body>
</html>
